spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/users/**

spring.cloud.gateway.routes[1].id=book-service
spring.cloud.gateway.routes[1].uri=${BOOK_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/books/**

spring.cloud.gateway.routes[2].id=progress-service
spring.cloud.gateway.routes[2].uri=${PROGRESS_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/progress/**

spring.cloud.gateway.routes[3].id=gamification-service
spring.cloud.gateway.routes[3].uri=${GAMIFICATION_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/gamification/**

spring.cloud.gateway.routes[4].id=shelf-service
spring.cloud.gateway.routes[4].uri=${SHELF_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/shelves/**

spring.cloud.gateway.routes[5].id=group-service
spring.cloud.gateway.routes[5].uri=${GROUP_SERVICE_URL:http://localhost:8086}
spring.cloud.gateway.routes[5].predicates[0]=Path=/groups/**

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=${CORS_ORIGINS:http://localhost:3000}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

